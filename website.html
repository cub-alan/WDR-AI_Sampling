<!DOCTYPE html> <!-- tells the browser that it's in html -->

<head> <!-- anything in head is a setting -->

<title>Weed Detection Robot</title> <!-- title of the webpage -->
<meta name="viewport" content="width=device-width, initial-scale=1"> <!-- makes the page scale correctly to both pc and mobile -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style> /* CSS styling for the webpage */

body{ /* style function for the whole page */
    font-family: "Times New Roman", Times, serif; /* all fonts on the page in rimes new roman */
    background: #7bcae0; /* background color of the page */
    color: #000000; /* default text color */
    margin: 0; /* removes default margin */
    display: flex; /* enables flexbox layout */
    flex-direction: column; /* boxes created are stacked vertically */
    align-items: center; /* centers the boxes on the page */
}

.container{ /* creates the camera container box */
    width: 100%; /* makes the box take up the full width of the page */
    max-width: 640px; /* limits the width of the box to 640px to keep it in a 4:3 aspect ratio */
    padding: 20px; 
    box-sizing: border-box;
}

.header{ /* header box that has the title */
    display: flex; /* enables flexbox layout */
    justify-content: space-between; /* ensures the boxes are either side of the header */
    align-items: center; /* centers the boxes vertically within the header */
    margin-bottom: 20px; 
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

h1{ /* title text styling */
    font-size: 24px;
    margin: 0;
    color: #000000;
    text-transform: uppercase; /* makes all text uppercase */
    letter-spacing: 2px; /* adds 2 pixel spacing between each letter*/
}

.navbar { /* navigation bar for the 4 pages */
    display: flex;
    gap: 4px; /* adds 4 pixels of space between each button */
    margin-bottom: 20px; /* adds 20 pixels of space below the navbar */
}

.nav-btn { /* style for the navbar buttons */
    flex: 1; /* makes each button take up an equal amount of space */
    padding: 10px; 
    background: #000000;
    color: #666666;
    border: none;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer; /* changes the cursor to a pointer when hovering over one of the buttons*/
    border-radius: 8px;
    transition: all 0.2s; /* adds a transition effect to the button */
}

.nav-btn.active {
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.cam-tabs {
    display: flex;
    width: 100%;
    gap: 2px;
    margin-bottom: 4px;
}

.cam-btn {
    flex: 1;
    padding: 10px;
    background: #000;
    color: #666;
    border: none;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
}

.cam-btn.active {
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.stream-box {
    background: #000;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    border: 1px solid #222;
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
}

.stream-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
}

.stream-box img.active {
    display: block;
}

.loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    z-index: 5;
}

.loading-overlay.active {
    display: flex;
}

.stream-label {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    pointer-events: none;
}

#map {
    width: 100%;
    height: 300px;
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid #222;
}

.data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}

.data-card {
    background: #000000;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #222;
    transition: border-color 0.3s;
}

.data-card:first-child {
    grid-column: span 2;
}

.label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.value {
    font-size: 16px;
    font-weight: 600;
    font-family: "JetBrains Mono", monospace;
    color: #fff;
}

.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
}

@keyframes dots {
    0%,32% {content: '.';}
    33%,65% {content: '..';}
    66%,100% {content: '...';}
}

.dots::after {
    content: '.';
    animation: dots 1.5s infinite steps(1);
}

.plant-list {
    width: 100%;
    margin-top: 10px;
}

.plant-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    color: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #222;
    cursor: pointer;
    user-select: none;
}


.sd-btn.active {
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.plant-item span:first-child {
    flex: 1;
}

.plant-status {
    font-size: 12px;
    color: #888;
    margin-left: 10px;
}

.archive-container {
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    border: 1px solid #222;
    border-radius: 10px;
    background: #fff;
}
.archive-container::-webkit-scrollbar {
    width: 6px;
}
.archive-container::-webkit-scrollbar-thumb {
    background: #000000;
    border-radius: 3px;
}
</style>
</head>

function updateModeUI(mode) {
    const btn = document.getElementById('btn-sd');
    const streamBox = document.querySelector('.stream-box');

    const cam1 = document.getElementById('btn-cam1');
    const cam2 = document.getElementById('btn-cam2');

    let overlay = document.getElementById('sd-overlay');

    // create overlay if not exists
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'sd-overlay';
        overlay.style.position = 'absolute';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.background = '#000';
        overlay.style.color = '#fff';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        overlay.style.fontSize = '20px';
        overlay.style.fontWeight = 'bold';
        overlay.style.letterSpacing = '2px';
        overlay.style.zIndex = '10';
        overlay.style.pointerEvents = 'none';
        overlay.innerText = 'IN SD MODE';

        streamBox.appendChild(overlay);
    }

    if (mode === "SD") {
        btn.classList.add('active');
        overlay.style.display = 'flex';
        cam1.classList.remove('active');
        cam2.classList.remove('active');
        cam1.style.opacity = "0.2";

    else {
        btn.classList.remove('active');
        overlay.style.display = 'none';
        cam1.style.opacity = "1";
        cam2.style.opacity = "1";
    }
}

function switchCam(id) {

    activeCam = id;
    
    const streamImg = document.getElementById('stream-primary');
    const loading = document.getElementById('cam-loading');
    const btn1 = document.getElementById('btn-cam1');
    const btn2 = document.getElementById('btn-cam2');

    const isSD = document.getElementById('btn-sd').classList.contains('active');

    if (isSD) {
        btn1.classList.remove('active');
        btn2.classList.remove('active');
        return;
    }

    loading.classList.add('active');

    btn1.classList.toggle('active', id === 1);
    btn2.classList.toggle('active', id === 2);

    // IMPORTANT:
    // Close the old MJPEG stream before opening the new one.
    streamImg.onload = null;
    streamImg.onerror = null;
    streamImg.src = "";

    setTimeout(() => {
        streamImg.onload = function() {
            hideLoading();
        };

        streamImg.onerror = function() {
            showError();
        };

        if (id === 1) {
            streamImg.src = "http://172.20.10.5:80/stream1?t=" + Date.now();
        } else {
            streamImg.src = "http://172.20.10.6:80/stream2?t=" + Date.now();
        }
    }, 300);
}

function updateStatus() {
    fetch('/status')
    .then(response => response.json())
    .then(data => {
        if (data.valid) {
            document.getElementById('gps-status').innerHTML ='<span class="status-dot status-locked"></span>Locked';
            const latDir = data.lat >= 0 ? 'N' : 'S';
            const lonDir = data.lon >= 0 ? 'E' : 'W';
            document.getElementById('coords').innerText = Math.abs(data.lat).toFixed(6) + ' ' + latDir + ', ' + Math.abs(data.lon).toFixed(6) + ' ' + lonDir;

            document.getElementById('alt').innerText = (data.alt || 0).toFixed(2) + ' m';
            document.getElementById('sats').innerText = data.sats || 0;

            // fallback time (since backend no longer sends h/m/s)
            const now = new Date();
            document.getElementById('gps-time').innerText = now.toUTCString().split(' ')[4];

            if (map && marker && document.getElementById('page2').style.display === 'block') {
                marker.setLatLng([data.lat, data.lon]);
                map.panTo([data.lat, data.lon]);
                // record for field mapping
                if (fieldTracking) {
                    fieldCoords.push([data.lat, data.lon]);
                    if (fieldPolygon) {
                        fieldPolygon.setLatLngs(fieldCoords);
                    }
                    else {
                        fieldPolygon = L.polygon(fieldCoords,{color:'yellow'}).addTo(map);
                    }
                }
            }
        }
        else {
            document.getElementById('gps-status').innerHTML ='Finding<span class="dots"></span>';
            document.getElementById('coords').innerText ='0.000000 N, 0.000000 W';
            document.getElementById('gps-time').innerText ='00:00:00';
            document.getElementById('sats').innerText = data.satellites || data.sats || 0;
        }
    })
.catch(err => console.error('Fetch error:', err));
}
setInterval(updateStatus, 1000);

function getPlantsFromItem(item) {
    if (Array.isArray(item.plants)) {
        return item.plants;
    }

    if (typeof item.labels === "string") {
        return item.labels.split(",").map(label => ({
            type: label.replace(/.*:/, "").trim(),
            confidence: null
        }));
    }

    return [];
}

function updateWeedPins() {
    if (!map) return;

    fetch('/api/detections')
    .then(r => r.json())
    .then(list => {
        // remove old weed pins
        weedMarkers.forEach(m => map.removeLayer(m));
        weedMarkers = [];

        if (!Array.isArray(list)) return;

        list.forEach(item => {
            const lat = Number(item.lat);
            const lon = Number(item.lon);

            // ignore invalid GPS points
            if (!lat || !lon || lat === 0 || lon === 0) return;

            const plants = getPlantsFromItem(item);

            const plantText = plants.length > 0
                ? plants.map(p => {
                    const conf = p.confidence != null
                        ? ` (${(p.confidence * 100).toFixed(1)}%)`
                        : "";
                    return `${p.type}${conf}`;
                }).join("<br>")
                : "Unknown weed";

            const popup = `
                <b>Weed detected</b><br>
                <b>Time:</b> ${item.timestamp || "N/A"}<br>
                <b>Camera:</b> ${item.cam || "N/A"}<br>
                <b>Plants:</b><br>${plantText}<br>
                <b>Lat:</b> ${lat.toFixed(6)}<br>
                <b>Lon:</b> ${lon.toFixed(6)}
            `;

            const weedMarker = L.marker([lat, lon]).addTo(map);
            weedMarker.bindPopup(popup);

            weedMarkers.push(weedMarker);
        });
    })
    .catch(err => console.error("Weed pin fetch error:", err));
}

function fetchArchive() {
    console.log("fetchArchive() running");

    fetch('/api/detections')
    .then(r => r.json())
    .then(list => {
        console.log("Archive data received:", list);

        const container = document.getElementById('archive-list');
        container.innerHTML = '';

        if (!Array.isArray(list) || list.length === 0) {
            container.innerHTML = "<div style='color:#666;padding:10px;'>No detections yet</div>";
            return;
        }

        let shownCount = 0;

        list.forEach(item => {
            const plants = getPlantsFromItem(item);

            if (selectedPlants.size > 0) {
                const match = plants.some(p => selectedPlants.has(p.type));
                if (!match) return;
            }

            const div = document.createElement('div');

            div.style.background = "#111";
            div.style.padding = "10px";
            div.style.border = "1px solid #222";
            div.style.borderRadius = "8px";
            div.style.color = "#fff";
            div.style.cursor = "pointer";

            div.innerHTML = `
                <div>
                    ${item.timestamp || "Unknown time"} —
                    ${plants.length > 0 ? plants.map(p => p.type).join(", ") : "None"}
                </div>
            `;

            div.onclick = () => openArchiveItem({
                ...item,
                plants: plants
            });

            container.appendChild(div);
            shownCount++;
        });

        if (shownCount === 0) {
            container.innerHTML = "<div style='color:#666;padding:10px;'>No matching detections</div>";
        }
    })
    .catch(err => {
        console.error("Archive fetch error:", err);

        const container = document.getElementById('archive-list');
        container.innerHTML = "<div style='color:red;padding:10px;'>Archive fetch failed</div>";
    });
}

function openArchiveItem(item) {
    document.getElementById('archive-view').style.display = 'none';
    document.getElementById('page3-detail').style.display = 'block';

    const container = document.getElementById('detail-content');

    console.log("OPEN ITEM:", item);

    let plants = [];

    // SAFE NORMALISATION
    if (Array.isArray(item.plants)) {
        plants = item.plants;
    } 
    else if (typeof item.labels === "string") {
        plants = item.labels.split(",").map(label => ({
            type: label.replace(/.*:/, "").trim(), // removes "Cam1:"
            confidence: null
        }));
    }

    container.innerHTML = `
        <div class="data-card">
            <div class="label">Timestamp</div>
            <div class="value">${item.timestamp || "N/A"}</div>
        </div>

        <div class="data-card">
            <div class="label">Detected Plants</div>
            <div class="value">
                ${
                    plants.length === 0
                    ? "None detected"
                    : plants.map(p => {
                        const type = p?.type || "Unknown";
                        const conf = p?.confidence;

                        return `
                        <div style="margin-bottom:6px;">
                            <b>${type}</b> — 
                            ${conf ? (conf * 100).toFixed(1) + "%" : "N/A"}
                            <br>
                            <span style="color:#888;font-size:12px;">
                                ${REMOVAL_METHODS[type] || "No removal method available"}
                            </span>
                        </div>`;
                    }).join("")
                }
            </div>
        </div>

        <div class="data-card">
            <div class="label">GNSS Data</div>
            <div class="value">
                Lat: ${item.lat ?? "?"}, Lon: ${item.lon ?? "?"}
            </div>
        </div>

        <div class="data-card">
            <div class="label">Image</div>
            ${
                item.image
                ? `<img src="data:image/jpeg;base64,${item.image}" 
                       style="width:100%; border-radius:10px; margin-top:8px;">`
                : `<div style="color:#666;">No image available</div>`
            }
        </div>
    `;
}

function backToArchive() {
    document.getElementById('page3-detail').style.display = 'none';
    document.getElementById('archive-view').style.display = 'block';
}

setInterval(() => {
    if (map && document.getElementById('page2').style.display === 'block') {
        updateWeedPins();
    }
}, 3000);

let activeCam = 1;

setInterval(() => {
    const isSD = document.getElementById('btn-sd').classList.contains('active');
    const livePageOpen = document.getElementById('page1').style.display !== 'none';

    if (!isSD && livePageOpen) {
        switchCam(activeCam);
    }
}, 30000);

</script>
