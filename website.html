<!DOCTYPE html> <!-- tells the browser that it's in html -->
<html> 
<head> <!-- anything in head is a setting -->

<title>Weed Detection Robot</title> <!-- title of the webpage -->
<meta name="viewport" content="width=device-width, initial-scale=1"> <!-- makes the page scale correctly to both pc and mobile -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <!-- Leaflet Map Library used for field mapping -->

<style> 

/* the following is visualisation settings for differnt elements of the webserver */

body{ /* style function for the whole page */
    font-family: "Times New Roman", Times, serif;
    background: #7bcae0;
    color: #000000; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
}

.container{ /* creates the camera container box */
    width: 100%; 
    max-width: 640px; 
    padding: 20px; 
    box-sizing: border-box;
}

.header{ /* header box that has the title */
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 20px; 
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

h1{ /* title text styling */
    font-size: 24px;
    margin: 0;
    color: #000000;
    text-transform: uppercase; 
    letter-spacing: 2px; 
}

.navbar { /* navigation bar for the 3 pages */
    display: flex;
    gap: 4px; 
    margin-bottom: 20px;
}

.nav-btn { /* style for the buttons made for nav bar but also used elsewhere*/
    flex: 1; 
    padding: 10px; 
    background: #000000;
    color: #666666;
    border: none;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s; 
}

.nav-btn.active { /*what the nav buttons look when active*/
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.cam-tabs { /*the button layout for the cam1/2 and SD mode buttons*/
    display: flex;
    width: 100%;
    gap: 2px;
    margin-bottom: 4px;
}

.cam-btn { /*cam buttons visuals*/
    flex: 1;
    padding: 10px;
    background: #000;
    color: #666;
    border: none;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
}

.cam-btn.active { /*cam button active visuals*/
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.stream-box { /*camera stream box visuals*/
    background: #000;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    border: 1px solid #222;
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
}

.stream-box img { /*stream image sizing*/
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
}

.stream-box img.active {/*display blocking when image is active*/
    display: block;
}

.loading-overlay { /*connecting to cam visuals*/
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    z-index: 5;
}

.loading-overlay.active {
    display: flex;
}

.stream-label {  /*cam visuals*/
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    pointer-events: none;
}

#map { /*feild map visuals*/
    width: 100%;
    height: 300px;
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid #222;
}

.data-grid { /*gnss data boxes*/
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}

.data-card { /*gnss data box visuals*/
    background: #000000;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #222;
    transition: border-color 0.3s;
}

.data-card:first-child { /*the longer status lock box*/
    grid-column: span 2;
}

.label { /*gnss labels*/
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.value { /*gnss value visuals*/
    font-size: 16px;
    font-weight: 600;
    font-family: "JetBrains Mono", monospace;
    color: #fff;
}

.status-dot { /*connecting dots*/
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
}

@keyframes dots { /*create the conecting dots animation*/
    0%,32% {content: '.';}
    33%,65% {content: '..';}
    66%,100% {content: '...';}
}

.dots::after { /*create connecting dots timing*/
    content: '.';
    animation: dots 1.5s infinite steps(1);
}

.plant-list { /*create filters layout*/
    width: 100%;
    margin-top: 10px;
}

.plant-item { /*create filters items*/
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    color: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #222;
    cursor: pointer;
    user-select: none;
}

.plant-item span:first-child { /*set the first box width*/
    flex: 1;
}

.archive-container { /*create the layout for the archeive*/
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    border: 1px solid #222;
    border-radius: 10px;
    background: #fff;
}
.archive-container::-webkit-scrollbar { /*create the scroll bar for the archeive*/
    width: 6px;
}
.archive-container::-webkit-scrollbar-thumb { /*set the scroll bar visuals*/
    background: #000000;
    border-radius: 3px;
}
</style>
</head>




<body> 
    <!-- all of this is actually creating a functional page -->
<div class="container">
    <div class="header">
        <h1>Weed Detection Robot</h1> <!--the title for whole page-->
    </div>
    <div class="navbar"> <!--create the buttons to be able to swap between the 3 pages-->
        <button id="nav1" class="nav-btn active" onclick="showPage(1)">Live</button>
        <button id="nav2" class="nav-btn" onclick="showPage(2)">Map</button>
        <button id="nav3" class="nav-btn" onclick="showPage(3)">Archive</button>
    </div>

    <div id="page1">

        <div class="stream-box"> <!--set up the camera stream box starting on cam 1 and hide the connecting animation-->
            <div id="cam-loading" class="loading-overlay">Connecting<span class="dots"></span></div>

            <img src="" id="stream-primary" class="active" 
            referrerpolicy="no-referrer"
            onload="hideLoading()" onerror="showError()">

            <div id="active-label" class="stream-label" style="display:none">Primary Feed</div>

        </div>
        <div class="cam-tabs" style="margin-top:8px;"> <!--create the buttons to switch cam veiw and SD mode-->
            <button id="btn-cam1" class="cam-btn active" onclick="switchCam(1)">Cam 1</button>
            <button id="btn-cam2" class="cam-btn" onclick="switchCam(2)">Cam 2</button>

            <div style="flex:1;"></div>

            <button id="btn-sd" class="cam-btn" onclick="alert('SD disabled during stream testing')">SD</button>

        </div>

        <div class="data-grid"> <!--create the gnss data grid showing each of the relevent bits of data-->
            <div class="data-card">
                <div class="label">GNSS Status</div>
                <div class="value" id="gps-status">
                    <span id="gps-text">Finding</span><span class="dots"></span>
                </div>
            </div>
            <div class="data-card">
                <div class="label">GPS Time (UTC)</div>
                <div class="value" id="gps-time">00:00:00</div>
            </div>
            <div class="data-card">
                <div class="label">Altitude</div>
                <div class="value" id="alt">0.00 m</div>
            </div>
            <div class="data-card">
                <div class="label">Satellites</div>
                <div class="value" id="sats">0</div>
            </div>
            <div class="data-card">
                <div class="label">Coordinates</div>
                <div class="value" id="coords">0.000000 N, 0.000000 W</div>
            </div>
        </div>
    </div>

    <div id="page2" style="display:none;"> <!--page two showing the feild mapping-->
        <h2>Map</h2>
        <div id="map"></div>
        <div style="display:flex; gap:8px; margin-top:10px;"> <!--create the two buttons to create and clear the feild map--> 
            <button id="fieldBtn" class="cam-btn" style="flex:1; border-radius:8px;" onclick="toggleField()">Start Field Map</button>
            <button id="clearFieldBtn" class="cam-btn" style="flex:1; border-radius:8px;" onclick="clearFieldMap()">Clear Field Map</button>
        </div>    
    </div>

   <div id="page3" style="display:none;"> <!--page 3 creating the archeive of data-->

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Archive</h2>

        <div style="display:flex; gap:8px;"> <!--sort the shown files based on the filters-->
            <button id="filterBtn" class="cam-btn" onclick="toggleFilters()">Filters</button>
        </div>
    </div>

    <div id="archive-view"> <!-- create the scrolling container for the archeive-->
        <div id="archive-list" class="archive-container"></div>
    </div>

    <div id="filter-view" style="display:none;"> <!--create the filters page accessable from the page 3 filters button-->
        <button class="cam-btn" onclick="toggleFilters()">← Back</button>

        <h3 style="color:white;">Filters</h3>

        <div id="plant-list" class="plant-list"> <!-- create the list of plant on the filters page with their toggleable tick box-->

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Nettles</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Creeping buttercup</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Bindweed</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Dandelion</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Couch grass</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Japanese knotweed</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Bramble</span>
                <input type="checkbox" readonly>
            </div>

            <div class="plant-item" onclick="togglePlantItem(this)">
                <span>Cow Parsley</span>
                <input type="checkbox" readonly>
            </div>

        </div>
    </div>

    <div id="page3-detail" style="display:none;"> <!--create the file page to show all data connected to that timestamp-->
        <button class="cam-btn" onclick="backToArchive()">← Back</button>
        <h2>Detection Details</h2>
        <div id="detail-content" style="color:rgb(0, 0, 0);"></div>
    </div>

</div>




<script>

    window.onload = () => {fetchArchive();switchCam(1);}; // once the page is loaded automatically try to get the cam1 feed

    let selectedPlants = new Set(); // create a variable to get ticked plants from the filters page 

    // create a lit of removal methods for each tyype of plant
    const REMOVAL_METHODS = { 
        "Nettles": "Hoe, fork young or established plants, deadhead, smother or strimming ",
        "Creeping thistle": "Cut repeatedly or apply herbicide to prevent spread.",
        "Bindweed": "Smother plants to remove light. Fork out seedlings as soon as possible and remove all of the root. Insert a physical barrier. ",
        "Dandelion": "Fork out young seedling as soon as possible, or smother plants ",
        "Couch grass": "Avoid disturbing soil. Fork out early seedlings as soon as seen.",
        "Japanese knotweed": "Do NOT cut freely — requires controlled herbicide treatment.",
        "Docks": "Deadhead, hoe seedlings, fork plants, smoother seedlings or plants. ",
        "Cleavers": "Can be removed in one go, or remove seedlings as soon as they form. Can hoe out or smother plants. ",
        "Creeping buttercup": "Deadhead plants, hoe seedlings, fork out plants or smother ",
        "Oxalises": "Dead head, hooe or fork out plants, rake or smother. ",
    };

    // create variables for the field mapping state 
    var map = null;
    var marker = null;
    var weedMarkers = [];
    let fieldTracking = false;
    let fieldCoords = [];
    let fieldPolygon = null;

    function updateModeUI(mode) {
        // read the values for each of the buttons 
        const btn = document.getElementById('btn-sd');
        const cam1 = document.getElementById('btn-cam1');
        const cam2 = document.getElementById('btn-cam2');

        const streamBox = document.querySelector('.stream-box'); // set up the stream box

        let overlay = document.getElementById('sd-overlay'); // set up the SD card mode visual

        // create the overlay if it does not exists yet with the set visual elements
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'sd-overlay';
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = '#000';
            overlay.style.color = '#fff';
            overlay.style.display = 'flex';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.fontSize = '20px';
            overlay.style.fontWeight = 'bold';
            overlay.style.letterSpacing = '2px';
            overlay.style.zIndex = '10';
            overlay.style.pointerEvents = 'none';
            overlay.innerText = 'IN SD MODE';

            streamBox.appendChild(overlay);
        }

        if (mode === "SD") { // if in SD mode set the overlay to stop the cam buttons being clickable
            btn.classList.add('active');
            overlay.style.display = 'flex';
            cam1.classList.remove('active');
            cam2.classList.remove('active');
            cam1.style.opacity = "0.2";
            cam2.style.opacity = "0.2";
        } 
        else { // if not in SD mode cam buttons are clickable
            btn.classList.remove('active');
            overlay.style.display = 'none';
            cam1.style.opacity = "1";
            cam2.style.opacity = "1";
        }
    }

    function updateMode() { // create a function to update the mode under the correct website header for the esp to read from
        fetch('/get_mode')
        .then(res => res.json())
        .then(data => {
            updateModeUI(data.type);
        });
    }
    function setSDMode() { 
        console.log("SD BUTTON CLICKED"); 

        // set the mode to SD and return any debug info got from the mode change
        fetch("/set_mode", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({mode: "sd"})
        })
        .then(res => res.json())
        .then(data => {
            console.log("MODE RESPONSE:", data);
            updateModeUI("SD");
        })
        .catch(err => console.error("Mode error:", err));
    }

    function setStreamMode() {
        // set the mode to STREAM and return any debug info got from the mode change
        fetch("/set_mode", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({mode: "stream"})
        }).then(() => {
            updateModeUI("STREAM");
            switchCam(1);
        });
    }

    setInterval(updateMode, 3000); // a delay of 3 seconds before update mode can be done again to allow for the esp to retreive the mode correctly

    function toggleFilters() {
        // create variables for the filter/archeive display
        const filterView = document.getElementById('filter-view');
        const archiveView = document.getElementById('archive-view');

        const isOpen = filterView.style.display === 'block'; 

        if (isOpen) { // if archeive is open stop filter display and get the archeive list
            filterView.style.display = 'none';
            archiveView.style.display = 'block';
            fetchArchive();
        } 
        else { // open filters and hide the archeive
            archiveView.style.display = 'none';
            filterView.style.display = 'block';
        }
    }

    function showLoading(msg = 'Connecting') { // if the camera isnt connected show the conecting animation with the three dots
        const loading = document.getElementById('cam-loading');
        loading.innerHTML = msg + '<span class="dots"></span>';
        loading.classList.add('active');
    }

    function showPage(id) {

        // create checks to see what page details
        document.getElementById('page1').style.display = id === 1 ? 'block' : 'none';
        document.getElementById('page2').style.display = id === 2 ? 'block' : 'none';
        document.getElementById('page3').style.display = id === 3 ? 'block' : 'none';


        // check which id is active
        document.getElementById('nav1').classList.toggle('active', id === 1);
        document.getElementById('nav2').classList.toggle('active', id === 2);
        document.getElementById('nav3').classList.toggle('active', id === 3);

        if (id === 3) { // if page 3 is active hide all other pages and show the archeive page
            document.getElementById('archive-view').style.display = 'block';
            document.getElementById('filter-view').style.display = 'none';
            document.getElementById('page3-detail').style.display = 'none';
            fetchArchive();
        }

        if (id === 2) { // if page 2 is active
        setTimeout(() => {
            if (!map) { // if map does not yet exist create a map using leaflet
                map = L.map('map').setView([0,0], 18); 
                
                // open the map with set starting zoom with x,y,z position fead in
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19
                }).addTo(map);

                // initialises a marker at 0 0 to be able to update to current possition later and center it
                marker = L.marker([0,0]).addTo(map); 
                marker.bindPopup("Robot current position");
            }

            // calculate size and draw the map
            map.invalidateSize(); 

            // load weed detection pins onto the map
            updateWeedPins();

        }, 100);
    }
    }

    function togglePlantItem(item) {
        // create plant name and check box
        const checkbox = item.querySelector('input[type="checkbox"]');
        const plantName = item.querySelector('span').innerText;

        checkbox.checked = !checkbox.checked; // if check box pressed swap mode

        if (checkbox.checked) { // if checked add the plant into the list of plants being searched for
            selectedPlants.add(plantName);
            item.style.borderColor = "#4caf50";
        } else { // if not checked remove the plant from the list
            selectedPlants.delete(plantName);
            item.style.borderColor = "#222";
        }

        console.log("Selected filters:", Array.from(selectedPlants));
    }

    function toggleField() {
        fieldTracking = !fieldTracking; // if feild tracking is pressed swap modes 

        document.getElementById('fieldBtn').innerText = fieldTracking // either have feild button text as start or stop mapping
            ? 'Stop Field Map'
            : 'Start Field Map';
    }

    function clearFieldMap() {
        fieldTracking = false; // stopp feild tracking
        fieldCoords = []; 

        if (fieldPolygon) { // if a map has been drawn remove it and make the map coordinates empty
            map.removeLayer(fieldPolygon);
            fieldPolygon = null;
        }

        document.getElementById('fieldBtn').innerText = 'Start Field Map'; // force feild map button to start 
    }

    function hideLoading() {
        document.getElementById('cam-loading').classList.remove('active'); // if cam shown hide connecting animation
    }

    function showError() {

        const loading = document.getElementById('cam-loading'); // 
        const btn2 = document.getElementById('btn-cam2'); // check if cam 2 is selected

        if (btn2.classList.contains('active')) { // if cam 2 but not displaying show connection fail
            loading.innerHTML = 'Connection Failed';
        } 
        else {
            loading.innerHTML = 'Connecting<span class="dots"></span>'; // show connecting on cam 1
        }
        loading.classList.add('active'); // show the messages on the stream box
    }

    function switchCam(id) {
        
        // set up primary stream with connecting animation
        const streamImg = document.getElementById('stream-primary');
        const loading = document.getElementById('cam-loading');

        // check if cam buttons is pressed
        const btn1 = document.getElementById('btn-cam1');
        const btn2 = document.getElementById('btn-cam2');

        const isSD = document.getElementById('btn-sd').classList.contains('active'); // check if SD button is pressed

        if (isSD) { // if in SD mode dont allow for cam buttons to be pressed
            btn1.classList.remove('active');
            btn2.classList.remove('active');
            return; // skip the rest 
        }

        // activate the loading animation
        loading.classList.add('active');
        // activate the buttons
        btn1.classList.toggle('active', id === 1); 
        btn2.classList.toggle('active', id === 2);

        // fully close previous MJPEG stream before a new one can open
        streamImg.onload = null;
        streamImg.onerror = null;
        streamImg.src = "about:blank";

        setTimeout(() => {
            streamImg.onload = function() { // if image shows hide loading animation
                hideLoading();
            };

            streamImg.onerror = function() { // if theres an error show connection error on display box
                showError();
            };

            if (id === 1) { // if button one is pressed activate the current stream 1 
                streamImg.src = "http://172.20.10.5:80/stream1?t=" + Date.now();
            } else { // if button 2 is pressed activate the current stream 2
                streamImg.src = "http://172.20.10.6:80/stream2?t=" + Date.now();
            }
        }, 500);
    }

    function updateStatus() {
        fetch('/status') // get the gnss stream from /status
        .then(response => response.json())
        .then(data => {
            if (data.valid) { // if the data is valid
                document.getElementById('gps-status').innerHTML ='<span class="status-dot status-locked"></span>Locked'; // changes the finding status to locked
                const latDir = data.lat >= 0 ? 'N' : 'S'; // if greater then 0 it north if not its south
                const lonDir = data.lon >= 0 ? 'E' : 'W'; // if greater then 0 its east if not its west
                document.getElementById('coords').innerText = Math.abs(data.lat).toFixed(6) + ' ' + latDir + ', ' + Math.abs(data.lon).toFixed(6) + ' ' + lonDir; // displays coord together
                
                // updates the satalite number and altitude from the json package
                document.getElementById('alt').innerText = (data.alt || 0).toFixed(2) + ' m';
                document.getElementById('sats').innerText = data.sats || 0;

                // displays the current satalite time
                const now = new Date(); 
                document.getElementById('gps-time').innerText = now.toUTCString().split(' ')[4];

                // if the map exists add adjust the possition to the lat and lon retreived
                if (map && marker && document.getElementById('page2').style.display === 'block') {
                    marker.setLatLng([data.lat, data.lon]);
                    map.panTo([data.lat, data.lon]);
                    
                    if (fieldTracking) {   // if teh feild tracking button is active add the coords to the polygon vector to draw the map
                        fieldCoords.push([data.lat, data.lon]);
                        if (fieldPolygon) {
                            fieldPolygon.setLatLngs(fieldCoords);
                        }
                        else { // if polygon doesnt exist make it then add the coords
                            fieldPolygon = L.polygon(fieldCoords,{color:'yellow'}).addTo(map);
                        }
                    }
                }
            }
            else { // if data isnt valid set keep finding animation and fille values with zeros 
                document.getElementById('gps-status').innerHTML ='Finding<span class="dots"></span>';
                document.getElementById('coords').innerText ='0.000000 N, 0.000000 W';
                document.getElementById('gps-time').innerText ='00:00:00';
                document.getElementById('sats').innerText = data.satellites || data.sats || 0;
            }
        })
    .catch(err => console.error('Fetch error:', err)); // get errors for debugging 
    }
    setInterval(updateStatus, 1000); // add a delay before update happens again to give way for other funtions to execute

    function getPlantsFromItem(item) {
        if (Array.isArray(item.plants)) { // if the plants intem array is correct exit function
            return item.plants;
        }

        if (typeof item.labels === "string") { // if its a string rater then an array parse it to turn it into an array and return it
            return item.labels.split(",").map(label => ({
                type: label.replace(/.*:/, "").trim(),
                confidence: null
            }));
        }

        return [];
    }

    function updateWeedPins() {
        if (!map) return; // if map doesnt exist skip this function

        fetch('/api/detections') // retrieve the detection info
        .then(r => r.json())
        .then(list => {
            
            // remove all old detections and reinitialise the weed markers
            weedMarkers.forEach(m => map.removeLayer(m)); 
            weedMarkers = [];

            if (!Array.isArray(list)) return; // if list isnt in array format skip the function 

            list.forEach(item => {
                // get the lat and lon from the gnss
                const lat = Number(item.lat);
                const lon = Number(item.lon);

                if (!lat || !lon || lat === 0 || lon === 0) return; // there is no valid positioning data then skip the function

                const plants = getPlantsFromItem(item); // get the plants from teh item array

                const plantText = plants.length > 0 // chekcs that the palnt exists and then works out the percentage of the confidence 
                    ? plants.map(p => {
                        const conf = p.confidence != null
                            ? ` (${(p.confidence * 100).toFixed(1)}%)`
                            : "";
                        return `${p.type}${conf}`;
                    }).join("<br>") // if no cofidence break the popup and label it unkown
                    : "Unknown weed";

                const popup = ` // define a pop up as all data from a specific pin
                    <b>Weed detected</b><br>
                    <b>Time:</b> ${item.timestamp || "N/A"}<br>
                    <b>Camera:</b> ${item.cam || "N/A"}<br>
                    <b>Plants:</b><br>${plantText}<br>
                    <b>Lat:</b> ${lat.toFixed(6)}<br>
                    <b>Lon:</b> ${lon.toFixed(6)}
                `;
                
                // add the pin to the variable as a popup 
                const weedMarker = L.marker([lat, lon]).addTo(map);
                weedMarker.bindPopup(popup);

                weedMarkers.push(weedMarker); // push the variable to the map 
            });
        })
        .catch(err => console.error("Weed pin fetch error:", err)); // if an error occurs send debug data
    }

    function fetchArchive() {
        console.log("fetchArchive() running");

        fetch('/api/detections') // retrieve the detection info
        .then(r => r.json())
        .then(list => {
            console.log("Archive data received:", list);

            const container = document.getElementById('archive-list'); // create the archeive container
            container.innerHTML = ''; // create a variable for archeive display

            if (!Array.isArray(list) || list.length === 0) { // if list isnt an array write to the container no detections and return 
                container.innerHTML = "<div style='color:#666;padding:10px;'>No detections yet</div>";
                return;
            }

            let shownCount = 0; // create a counter

            list.forEach(item => {  // loop through every detection
                const plants = getPlantsFromItem(item); // get plant name

                if (selectedPlants.size > 0) { // checks the plant againsth the filter to see if it is wanted if not return
                    const match = plants.some(p => selectedPlants.has(p.type));
                    if (!match) return;
                }

                // create a new file for the plant of set visuals
                const div = document.createElement('div'); 
                div.style.background = "#111";
                div.style.padding = "10px";
                div.style.border = "1px solid #222";
                div.style.borderRadius = "8px";
                div.style.color = "#fff";
                div.style.cursor = "pointer";

                div.innerHTML = ` // create the html for the file header and name with the timestamp and weed found
                    <div>
                        ${item.timestamp || "Unknown time"} —
                        ${plants.length > 0 ? plants.map(p => p.type).join(", ") : "None"}
                    </div>
                `;

                div.onclick = () => openArchiveItem({ // open the file when clicked
                    ...item,
                    plants: plants
                });

                // add the card to the archeive and add one to the counter
                container.appendChild(div);
                shownCount++;
            });

            if (shownCount === 0) { //if nothing is found show the no matching detection on the archeive container
                container.innerHTML = "<div style='color:#666;padding:10px;'>No matching detections</div>";
            }
        })
        .catch(err => { // if there is an error get debug data and display on contaier the error message
            console.error("Archive fetch error:", err);

            const container = document.getElementById('archive-list');
            container.innerHTML = "<div style='color:red;padding:10px;'>Archive fetch failed</div>";
        });
    }

    function openArchiveItem(item) {
        // open the file veiw and close the archeive veiw
        document.getElementById('archive-view').style.display = 'none';
        document.getElementById('page3-detail').style.display = 'block';

        // create the container for the file contents
        const container = document.getElementById('detail-content'); 

        console.log("OPEN ITEM:", item);

        let plants = [];

        if (Array.isArray(item.plants)) { // if item is an array then get the plant from the array
            plants = item.plants;
        } 
        else if (typeof item.labels === "string") { //  if its a string and not an array attempt to parse to get the plant
            plants = item.labels.split(",").map(label => ({
                type: label.replace(/.*:/, "").trim(), // removes "Cam1:"
                confidence: null
            }));
        }

        container.innerHTML = ` // creaetes the layout container for all of the file info 
            <div class="data-card">
                <div class="label">Timestamp</div>
                <div class="value">${item.timestamp || "N/A"}</div>
            </div>

            <div class="data-card">
                <div class="label">Detected Plants</div>
                <div class="value">
                    ${
                        plants.length === 0
                        ? "None detected"
                        : plants.map(p => {
                            const type = p?.type || "Unknown";
                            const conf = p?.confidence;

                            return `
                            <div style="margin-bottom:6px;">
                                <b>${type}</b> — 
                                ${conf ? (conf * 100).toFixed(1) + "%" : "N/A"}
                                <br>
                                <span style="color:#888;font-size:12px;">
                                    ${REMOVAL_METHODS[type] || "No removal method available"}
                                </span>
                            </div>`;
                        }).join("")
                    }
                </div>
            </div>

            <div class="data-card">
                <div class="label">GNSS Data</div>
                <div class="value">
                    Lat: ${item.lat ?? "?"}, Lon: ${item.lon ?? "?"}
                </div>
            </div>

            <div class="data-card">
                <div class="label">Image</div>
                ${
                    item.image
                    ? `<img src="data:image/jpeg;base64,${item.image}" 
                        style="width:100%; border-radius:10px; margin-top:8px;">`
                    : `<div style="color:#666;">No image available</div>`
                }
            </div>
        `;
    }

    function backToArchive() { // create a back button to return to the archeive 
        document.getElementById('page3-detail').style.display = 'none';
        document.getElementById('archive-view').style.display = 'block';
    }

    setInterval(() => { // create a delay between each pin on the map
        if (map && document.getElementById('page2').style.display === 'block') {
            updateWeedPins();
        }
    }, 3000);

</script>
