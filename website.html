<!DOCTYPE html> <!-- tells the browser that it's in html -->
<html> 
<head> <!-- anything in head is a setting -->

<title>Weed Detection Robot</title> <!-- title of the webpage -->
<meta name="viewport" content="width=device-width, initial-scale=1"> <!-- makes the page scale correctly to both pc and mobile -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style> /* CSS styling for the webpage */

body{ /* style function for the whole page */
    font-family: "Times New Roman", Times, serif; /* all fonts on the page in rimes new roman */
    background: #7bcae0; /* background color of the page */
    color: #000000; /* default text color */
    margin: 0; /* removes default margin */
    display: flex; /* enables flexbox layout */
    flex-direction: column; /* boxes created are stacked vertically */
    align-items: center; /* centers the boxes on the page */
}

.container{ /* creates the camera container box */
    width: 100%; /* makes the box take up the full width of the page */
    max-width: 640px; /* limits the width of the box to 640px to keep it in a 4:3 aspect ratio */
    padding: 20px; 
    box-sizing: border-box;
}

.header{ /* header box that has the title */
    display: flex; /* enables flexbox layout */
    justify-content: space-between; /* ensures the boxes are either side of the header */
    align-items: center; /* centers the boxes vertically within the header */
    margin-bottom: 20px; 
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

h1{ /* title text styling */
    font-size: 24px;
    margin: 0;
    color: #000000;
    text-transform: uppercase; /* makes all text uppercase */
    letter-spacing: 2px; /* adds 2 pixel spacing between each letter*/
}

.navbar { /* navigation bar for the 4 pages */
    display: flex;
    gap: 4px; /* adds 4 pixels of space between each button */
    margin-bottom: 20px; /* adds 20 pixels of space below the navbar */
}

.nav-btn { /* style for the navbar buttons */
    flex: 1; /* makes each button take up an equal amount of space */
    padding: 10px; 
    background: #000000;
    color: #666666;
    border: none;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer; /* changes the cursor to a pointer when hovering over one of the buttons*/
    border-radius: 8px;
    transition: all 0.2s; /* adds a transition effect to the button */
}

.nav-btn.active {
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.cam-tabs {
    display: flex;
    width: 100%;
    gap: 2px;
    margin-bottom: 4px;
}

.cam-btn {
    flex: 1;
    padding: 10px;
    background: #000;
    color: #666;
    border: none;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
}

.cam-btn.active {
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.stream-box {
    background: #000;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    border: 1px solid #222;
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
}

.stream-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
}

.stream-box img.active {
    display: block;
}

.loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    z-index: 5;
}

.loading-overlay.active {
    display: flex;
}

.stream-label {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    pointer-events: none;
}

#map {
    width: 100%;
    height: 300px;
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid #222;
}

.data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}

.data-card {
    background: #000000;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #222;
    transition: border-color 0.3s;
}

.data-card:first-child {
    grid-column: span 2;
}

.label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.value {
    font-size: 16px;
    font-weight: 600;
    font-family: "JetBrains Mono", monospace;
    color: #fff;
}

.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
}

@keyframes dots {
    0%,32% {content: '.';}
    33%,65% {content: '..';}
    66%,100% {content: '...';}
}

.dots::after {
    content: '.';
    animation: dots 1.5s infinite steps(1);
}

.plant-list {
    width: 100%;
    margin-top: 10px;
}

.plant-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    color: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #222;
    cursor: pointer;
    user-select: none;
}


.sd-btn.active {
    background: #151619;
    color: #fff;
    border-bottom: 2px solid #079AF0;
}

.plant-item span:first-child {
    flex: 1;
}

.plant-status {
    font-size: 12px;
    color: #888;
    margin-left: 10px;
}

.archive-container {
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    border: 1px solid #222;
    border-radius: 10px;
    background: #ffffff;
}
.archive-container::-webkit-scrollbar {
    width: 6px;
}
.archive-container::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 3px;
}

</style>

function updateModeUI(mode) {
    const btn = document.getElementById('btn-sd');

    else {

        overlay.style.display = 'none';
        cam1.style.opacity = "1";
        cam2.style.opacity = "1";
    }
}

function toggleFilters() {
    const filterView = document.getElementById('filter-view');
    const archiveView = document.getElementById('archive-view');

    const isOpen = filterView.style.display === 'block';

    if (isOpen) {
        // CLOSE
        filterView.style.display = 'none';
        archiveView.style.display = 'block';
        fetchArchive();
    } 
    else {
        // OPEN
        archiveView.style.display = 'none';
        filterView.style.display = 'block';
    }
}

// util for loader overlay
function showLoading(msg = 'Connecting') {
    const loading = document.getElementById('cam-loading');
    loading.innerHTML = msg + '<span class="dots"></span>';
    loading.classList.add('active');
}
function showPage(id) {
    document.getElementById('page1').style.display = id === 1 ? 'block' : 'none';
    document.getElementById('page2').style.display = id === 2 ? 'block' : 'none';
    document.getElementById('page3').style.display = id === 3 ? 'block' : 'none';
    
    document.getElementById('nav1').classList.toggle('active', id === 1);
    document.getElementById('nav2').classList.toggle('active', id === 2);
    document.getElementById('nav3').classList.toggle('active', id === 3);

    if (id === 3) {
        fetchArchive();
    }

    if (id === 2) {
        setTimeout(() => {
            if (!map) {
                map = L.map('map').setView([0,0], 18);
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19
                }).addTo(map);
                marker = L.marker([0,0]).addTo(map);
            }
            map.invalidateSize();
        }, 100);
    }
}

function togglePlantItem(item) {
    const checkbox = item.querySelector('input[type="checkbox"]');
    const plantName = item.querySelector('span').innerText;

    checkbox.checked = !checkbox.checked;

    if (checkbox.checked) {
        selectedPlants.add(plantName);
        item.style.borderColor = "#4caf50";
    } 
    else {
        selectedPlants.delete(plantName);
        item.style.borderColor = "#222";
    }
}

function openFilters() {

    document.getElementById('fieldBtn').innerText = fieldTracking ? 'Stop & Clear Field Map' : 'Create Field Map';

function hideLoading() {
    document.getElementById('cam-loading').classList.remove('active');

function showError() {
    const loading = document.getElementById('cam-loading');
    const btn2 = document.getElementById('btn-cam2');
    if (btn2.classList.contains('active')) {
        loading.innerHTML = 'Connection Failed';
    } 
    else {
        // primary camera error – show connecting animation instead
        loading.innerHTML = 'Connecting<span class="dots"></span>';
    }
    loading.classList.add('active');
}

function switchCam(id) {
    const streamImg = document.getElementById('stream-primary');
    const loading = document.getElementById('cam-loading');
    const btn1 = document.getElementById('btn-cam1');
    const btn2 = document.getElementById('btn-cam2');

    const isSD = document.getElementById('btn-sd').classList.contains('active');
    if (isSD) {
        document.getElementById('btn-cam1').classList.remove('active');
        document.getElementById('btn-cam2').classList.remove('active');
        return;
    }

    // Show loading state immediately
    loading.classList.add('active');
    
    // Update buttons
    btn1.classList.toggle('active', id === 1);
    btn2.classList.toggle('active', id === 2);

    // Swap Source with a Cache Buster (?t=...) to force a reconnect
    const cacheBuster = "?t=" + new Date().getTime();
    if (id === 1) {
        streamImg.src = "/stream1" + cacheBuster;
    } 
    else {
        streamImg.src = "/stream2" + cacheBuster;
    }
}

function updateStatus() {
    fetch('/status')
    .then(response => response.json())
    .then(data => {
        if (data.valid) {
            document.getElementById('gps-status').innerHTML ='<span class="status-dot status-locked"></span>Locked';
            const latDir = data.lat >= 0 ? 'N' : 'S';
            const lonDir = data.lon >= 0 ? 'E' : 'W';
            document.getElementById('coords').innerText = Math.abs(data.lat).toFixed(6) + ' ' + latDir + ', ' + Math.abs(data.lon).toFixed(6) + ' ' + lonDir;

            document.getElementById('alt').innerText = (data.alt || 0).toFixed(2) + ' m';
            document.getElementById('sats').innerText = data.sats || 0;

            // fallback time (since backend no longer sends h/m/s)
            const now = new Date();
            document.getElementById('gps-time').innerText = now.toUTCString().split(' ')[4];

            if (map && marker && document.getElementById('page2').style.display === 'block') {
                marker.setLatLng([data.lat, data.lon]);
                map.panTo([data.lat, data.lon]);
                // record for field mapping
                if (fieldTracking) {
                    fieldCoords.push([data.lat, data.lon]);
                    if (fieldPolygon) {
                        fieldPolygon.setLatLngs(fieldCoords);
                    }
                    else {
                        fieldPolygon = L.polygon(fieldCoords,{color:'yellow'}).addTo(map);
                    }
                }
            }
        }
        else {
            document.getElementById('gps-status').innerHTML ='Finding<span class="dots"></span>';
            document.getElementById('coords').innerText ='0.000000 N, 0.000000 W';
            document.getElementById('gps-time').innerText ='00:00:00';
            document.getElementById('sats').innerText = data.satellites || data.sats || 0;
        }
    })
.catch(err => console.error('Fetch error:', err));
}
setInterval(updateStatus, 1000);

        <p><b>Longitude:</b> ${item.lon}</p>

*/
function fetchArchive() {
    const list = MOCK_DETECTIONS;

    const container = document.getElementById('archive-list');
    container.innerHTML = '';

    let filtered = list;

    if (selectedPlants.size > 0) {
        filtered = list.filter(item =>item.plants &&item.plants.some(p => selectedPlants.has(p.type)));
    }

    if (!filtered || filtered.length === 0) {
        container.innerHTML = "<div style='color:#666;padding:10px;'>No matching detections</div>";
        return;
    }

    filtered.forEach((item) => {
        const div = document.createElement('div');

        div.style.background = "#111";
        div.style.padding = "10px";
        div.style.border = "1px solid #222";
        div.style.borderRadius = "8px";
        div.style.color = "white";
        div.style.cursor = "pointer";

        div.innerHTML = `
            <div style="font-size:12px;">
                🕒 ${item.timestamp} — ${item.plants.map(p => p.type).join(", ")}
            </div>
        `;

        div.onclick = () => openArchiveItem(item);

        container.appendChild(div);
    });
}

function openArchiveItem(item) {
    document.getElementById('archive-list').style.display = 'none';
    document.getElementById('page3-detail').style.display = 'block';

    const container = document.getElementById('detail-content');

    container.innerHTML = `
        <p><b>Time:</b> ${item.timestamp}</p>
        <p><b>Location:</b> ${item.lat}, ${item.lon}</p>

        <p><b>Detected Plants:</b></p>
        <ul>
            ${item.plants.map(p => `<li>${p.type} (${(p.confidence*100).toFixed(1)}%)</li>`).join("")}
        </ul>

        <p><b>Action:</b> ${item.action}</p>

        <h3>Cam 1</h3>
        ${item.cam1.image ? `<img src="${item.cam1.image}" style="width:100%;border-radius:10px;">` : "No image"}

        <h3>Cam 2</h3>
        ${item.cam2.image ? `<img src="${item.cam2.image}" style="width:100%;border-radius:10px;">` : "No image"}
    `;
}


function backToArchive() {
    document.getElementById('page3-detail').style.display = 'none';
    document.getElementById('archive-list').style.display = 'block';

    fetchArchive();
}
